name: Validate Skills

on:
  pull_request:
    paths:
      - 'src/**'
      - 'types/**'
      - 'scripts/**'
      - 'dev/**'

jobs:
  validate:
    name: Validate, Build & Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tinyhumansai/openhuman_ci:rust-1.93.0

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Type-check
        run: yarn typecheck

      # - name: Lint
      #   run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Validate skills
        run: yarn validate

      - name: Build skills
        run: yarn build

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            openhuman/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-ci-${{ hashFiles('openhuman/Cargo.lock') }}
          restore-keys: rust-ci-

      - name: Build openhuman-core (skills runtime)
        run: cargo build --manifest-path openhuman/Cargo.toml --profile ci --bin openhuman-core
        env:
          CARGO_INCREMENTAL: '0'

      - name: Copy CI binary for test runner
        run: |
          mkdir -p openhuman/target/debug
          cp openhuman/target/ci/openhuman-core openhuman/target/debug/openhuman-core

      - name: Run tests
        run: yarn test
