name: Sync to upstream/develop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sync-to-upstream-develop
  cancel-in-progress: false

jobs:
  build:
    environment: Production
    name: Build and upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to upstream/main
        run: |
          mkdir -p public
          rsync -a --exclude 'public' ./ public/
          cp -r .husky public/

          rm public/CLAUDE.md
          rm -rf public/.claude
          rm -rf public/.github/workflows
          mv public/.github/workflows_public public/.github/workflows

      - name: Update GH repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: openhumanxyz/openhuman
          publish_dir: ./public
          publish_branch: main
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          full_commit_message: "chore: update main branch [skip ci]"
          personal_token: ${{ secrets.XGITHUB_TOKEN }}
          exclude_assets: ""
